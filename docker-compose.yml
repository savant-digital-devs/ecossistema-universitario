services:
  postgres:
    image: postgres:15-alpine
    container_name: univ_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: changeme_local_dev
      POSTGRES_DB: university_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: univ_redis
    ports:
      - '6379:6379'

volumes:
  pgdata:
